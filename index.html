<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don't Click 😈</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
 background:#000;
 color:#fff;
 font-family:'Segoe UI',sans-serif;
 overflow:hidden;
 text-align:center;
}

/* SCREEN */
.screen{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 transition:0.6s;
}

/* BUTTON */
button{
 padding:12px 25px;
 border:none;
 border-radius:20px;
 background:linear-gradient(45deg,#ff4e50,#fc913a);
 color:#fff;
 font-size:18px;
}

/* GLOW */
.glow{
 font-size:40px;
 animation:glow 1s infinite alternate;
}
@keyframes glow{
 from{text-shadow:0 0 10px #fff}
 to{text-shadow:0 0 40px #ff4e50}
}

/* IMAGE */
#riya{
 width:240px;
 border-radius:20px;
 margin-top:15px;
 filter:blur(25px);
 transform:scale(1.3);
 transition:1.5s;
}
.clear{
 filter:blur(0);
 transform:scale(1);
}

/* HIDE */
.hidden{opacity:0;pointer-events:none}

/* FLASH */
.flash{
 position:fixed;
 width:100%;
 height:100%;
 background:white;
 opacity:0;
 pointer-events:none;
}

/* SHAKE */
.shake{
 animation:shake 0.3s infinite;
}
@keyframes shake{
 0%{transform:translate(0)}
 25%{transform:translate(3px,-3px)}
 50%{transform:translate(-3px,3px)}
 75%{transform:translate(3px,3px)}
}

/* CANVAS */
canvas{position:absolute;top:0;left:0}
</style>
</head>

<body>

<div id="flash" class="flash"></div>

<!-- START -->
<div id="start" class="screen">
 <h1>⚠️ DON'T CLICK ⚠️</h1>
 <p>(Riya mat click karna 😐)</p>
 <button onclick="startFun()">Click Me 😜</button>
</div>

<!-- FUN -->
<div id="fun" class="screen hidden">
 <h2 id="funText"></h2>
</div>

<!-- GAME -->
<div id="game" class="screen hidden">
 <h2>Pakad ke dikha 😜</h2>
 <button id="moveBtn">Catch Me 😂</button>
</div>

<!-- FINAL -->
<div id="final" class="screen hidden">
 <canvas id="canvas"></canvas>
 <h1 class="glow">🎉 HAPPY BIRTHDAY RIYA 🎂</h1>
 <img src="riya.jpg" id="riya">
 <div id="msg"></div>
</div>

<audio id="music" src="music.mp3"></audio>

<script>

/* FORCE MUSIC UNLOCK */
let music=document.getElementById("music");
document.body.addEventListener("click",()=>{
 music.play().then(()=>music.pause());
},{once:true});

/* START */
function startFun(){
 start.classList.add("hidden");
 setTimeout(()=>{
   fun.classList.remove("hidden");
   showFun();
 },500);
}

/* FUN */
let funLines=[
"Maine mana kiya tha na 😑😂",
"Ab jo hoga uski zimmedar aap ho 😈"
];
let i=0;
function showFun(){
 if(i<funLines.length){
  funText.innerHTML=funLines[i];
  i++;
  setTimeout(showFun,1800);
 }else{
  setTimeout(()=>{
   fun.classList.add("hidden");
   game.classList.remove("hidden");
   startGame();
  },800);
 }
}

/* GAME */
let clicks=0;
function startGame(){
 moveBtn.onclick=()=>{
  clicks++;
  if(clicks<5){
   moveBtn.style.position="absolute";
   moveBtn.style.top=Math.random()*80+"%";
   moveBtn.style.left=Math.random()*80+"%";
  }else{
   game.classList.add("hidden");
   glitch();
  }
 }
}

/* GLITCH + SHAKE */
function glitch(){
 document.body.classList.add("shake");
 if(navigator.vibrate) navigator.vibrate(200);

 setTimeout(()=>{
  document.body.classList.remove("shake");
  alert("System hacked 😈");
  setTimeout(()=>{
   alert("Relax 😂 prank tha");
   showFinal();
  },800);
 },800);
}

/* FINAL */
function showFinal(){
 final.classList.remove("hidden");

 // FLASH BLAST
 let flash=document.getElementById("flash");
 flash.style.opacity=1;
 setTimeout(()=>flash.style.opacity=0,200);

 // MUSIC
 music.currentTime=0;
 music.play();

 // IMAGE REVEAL
 setTimeout(()=>riya.classList.add("clear"),1000);

 // TEXT
 let text=[
 "Aap meri life ka best part ho 💖",
 "Kabhi Masti, Kabhi Gussa 😂",
 "Par aapke bina mn nhi lgta hai 😶",
 "Hamesha khush raho mari pagli 😜"
 ];
 let j=0;
 function type(){
  if(j<text.length){
   msg.innerHTML+=text[j]+"<br>";
   j++;
   setTimeout(type,1400);
  }
 }
 type();

 fireworks();
 confetti();
}

/* FIREWORKS COLOR */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
function fireworks(){
 setInterval(()=>{
  let x=Math.random()*canvas.width;
  let y=Math.random()*canvas.height/2;
  for(let i=0;i<60;i++){
   particles.push({
    x,y,
    vx:(Math.random()-0.5)*6,
    vy:(Math.random()-0.5)*6,
    a:1,
    color:`hsl(${Math.random()*360},100%,50%)`
   });
  }
 },600);
 animate();
}

function animate(){
 ctx.fillStyle="rgba(0,0,0,0.2)";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 particles.forEach((p,i)=>{
  p.x+=p.vx;
  p.y+=p.vy;
  p.a-=0.02;
  ctx.fillStyle=`rgba(${hexToRgb(p.color)},${p.a})`;
  ctx.fillRect(p.x,p.y,2,2);
  if(p.a<=0)particles.splice(i,1);
 });

 requestAnimationFrame(animate);
}

/* COLOR CONVERT */
function hexToRgb(h){
 let c=document.createElement("canvas").getContext("2d");
 c.fillStyle=h;
 return c.fillStyle.match(/\d+/g).slice(0,3).join(",");
}

/* CONFETTI */
function confetti(){
 for(let i=0;i<100;i++){
  let div=document.createElement("div");
  div.style.position="absolute";
  div.style.width="5px";
  div.style.height="5px";
  div.style.background=`hsl(${Math.random()*360},100%,50%)`;
  div.style.top=Math.random()*100+"%";
  div.style.left=Math.random()*100+"%";
  document.body.appendChild(div);
 }
}

</script>

</body>
</html>
